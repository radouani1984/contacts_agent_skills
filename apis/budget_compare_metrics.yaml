# apis/budget_compare_metrics.yaml

type: api

sql: |
  {{ $brand := .args.brand | default "" | replace "'" "''" }}
  {{ $country := .args.country | default "" | replace "'" "''" }}
  {{ $media := .args.media | default "" | replace "'" "''" }}
  {{ $subbrand := .args.subbrand | default "" | replace "'" "''" }}
  {{ $product := .args.product | default "" | replace "'" "''" }}
  {{ $submedia := .args.submedia | default "" | replace "'" "''" }}
  {{ $status := .args.status | default "" | replace "'" "''" }}
  {{ $workflow_process := .args.workflow_process | default "" | replace "'" "''" }}
  {{ $flight_status := .args.flight_status | default "" | replace "'" "''" }}
  {{ $flight_progress := .args.flight_progress | default "" | replace "'" "''" }}
  {{ $metric_a := .args.metric_a | default "media_net" | replace "'" "''" }}
  {{ $metric_b := .args.metric_b | default "gross_investment" | replace "'" "''" }}
  {{ $compare_dimension := .args.compare_dimension | default "" | replace "'" "''" }}
  {{ $value_a := .args.value_a | default "" | replace "'" "''" }}
  {{ $value_b := .args.value_b | default "" | replace "'" "''" }}

  WITH base AS (
    SELECT *
    FROM bigquery_budget_model_2025
    WHERE 1 = 1
    {{ if $brand }}
      AND LOWER(TRIM(CAST(brand AS VARCHAR))) = LOWER(TRIM('{{ $brand }}'))
    {{ end }}
    {{ if $country }}
      AND LOWER(TRIM(CAST(country AS VARCHAR))) = LOWER(TRIM('{{ $country }}'))
    {{ end }}
    {{ if $media }}
      AND LOWER(TRIM(CAST(media AS VARCHAR))) = LOWER(TRIM('{{ $media }}'))
    {{ end }}
    {{ if $subbrand }}
      AND LOWER(TRIM(CAST(subbrand AS VARCHAR))) = LOWER(TRIM('{{ $subbrand }}'))
    {{ end }}
    {{ if $product }}
      AND LOWER(TRIM(CAST(product AS VARCHAR))) = LOWER(TRIM('{{ $product }}'))
    {{ end }}
    {{ if $submedia }}
      AND LOWER(TRIM(CAST(submedia AS VARCHAR))) = LOWER(TRIM('{{ $submedia }}'))
    {{ end }}
    {{ if $status }}
      AND LOWER(TRIM(CAST(status AS VARCHAR))) = LOWER(TRIM('{{ $status }}'))
    {{ end }}
    {{ if $workflow_process }}
      AND LOWER(TRIM(CAST(workflow_process AS VARCHAR))) = LOWER(TRIM('{{ $workflow_process }}'))
    {{ end }}
    {{ if $flight_status }}
      AND LOWER(TRIM(CAST(flight_status AS VARCHAR))) = LOWER(TRIM('{{ $flight_status }}'))
    {{ end }}
    {{ if $flight_progress }}
      AND LOWER(TRIM(CAST(flight_progress AS VARCHAR))) = LOWER(TRIM('{{ $flight_progress }}'))
    {{ end }}
  ),

  dimensioned AS (
    SELECT
      CASE '{{ $compare_dimension }}'
        WHEN 'brand' THEN brand
        WHEN 'country' THEN country
        WHEN 'region' THEN region
        WHEN 'subbrand' THEN subbrand
        WHEN 'product' THEN product
        WHEN 'media' THEN media
        WHEN 'submedia' THEN submedia
        WHEN 'digital_lever' THEN digital_lever
        WHEN 'status' THEN status
        WHEN 'workflow_process' THEN workflow_process
        WHEN 'flight_status' THEN flight_status
        WHEN 'flight_progress' THEN flight_progress
        ELSE 'All'
      END AS segment,
      *
    FROM base
  ),

  scoped AS (
    SELECT *
    FROM dimensioned
    WHERE '{{ $compare_dimension }}' = ''
      OR '{{ $value_a }}' = ''
      OR LOWER(TRIM(CAST(segment AS VARCHAR))) IN (
        LOWER(TRIM('{{ $value_a }}')),
        LOWER(TRIM('{{ $value_b }}'))
      )
  ),

  aggregated AS (
    SELECT
      segment,
      SUM(COALESCE(media_net_eur, 0)) AS media_net,
      SUM(COALESCE(committed_total_eur, 0)) AS committed,
      SUM(COALESCE(gross_investment_eur, 0)) AS gross_investment,
      SUM(COALESCE(media_agency_fees_eur, 0)) AS media_agency_fees,
      SUM(COALESCE(technical_costs_eur, 0)) AS technical_costs,
      SUM(COALESCE(media_taxes_eur, 0)) AS media_taxes,
      SUM(COALESCE(non_media_costs_eur, 0)) AS non_media_costs,
      SUM(COALESCE(purchase_order_amount, 0)) AS purchase_order_amount,
      SUM(COALESCE(proposal_amount, 0)) AS proposal_amount,
      SUM(COALESCE(purchase_order_amount, 0)) - SUM(COALESCE(proposal_amount, 0)) AS proposal_to_po_gap,
      SUM(COALESCE(rate_card_eur, 0)) AS rate_card,
      COUNT(*) AS row_count
    FROM scoped
    WHERE segment IS NOT NULL
      AND TRIM(CAST(segment AS VARCHAR)) <> ''
    GROUP BY segment
  ),

  metric_rows AS (
    SELECT segment, '{{ $metric_a }}' AS metric, row_count,
      CASE '{{ $metric_a }}'
        WHEN 'gross_investment' THEN gross_investment
        WHEN 'media_agency_fees' THEN media_agency_fees
        WHEN 'technical_costs' THEN technical_costs
        WHEN 'media_taxes' THEN media_taxes
        WHEN 'non_media_costs' THEN non_media_costs
        WHEN 'committed' THEN committed
        WHEN 'purchase_order_amount' THEN purchase_order_amount
        WHEN 'proposal_amount' THEN proposal_amount
        WHEN 'proposal_to_po_gap' THEN proposal_to_po_gap
        WHEN 'rate_card' THEN rate_card
        ELSE media_net
      END AS value_eur
    FROM aggregated

    UNION ALL
    SELECT segment, '{{ $metric_b }}' AS metric, row_count,
      CASE '{{ $metric_b }}'
        WHEN 'gross_investment' THEN gross_investment
        WHEN 'media_agency_fees' THEN media_agency_fees
        WHEN 'technical_costs' THEN technical_costs
        WHEN 'media_taxes' THEN media_taxes
        WHEN 'non_media_costs' THEN non_media_costs
        WHEN 'committed' THEN committed
        WHEN 'purchase_order_amount' THEN purchase_order_amount
        WHEN 'proposal_amount' THEN proposal_amount
        WHEN 'proposal_to_po_gap' THEN proposal_to_po_gap
        WHEN 'rate_card' THEN rate_card
        ELSE media_net
      END AS value_eur
    FROM aggregated
  )

  SELECT
    segment,
    metric,
    value_eur,
    row_count,
    '{{ $compare_dimension }}' AS compare_dimension,
    '{{ $value_a }}' AS requested_value_a,
    '{{ $value_b }}' AS requested_value_b
  FROM metric_rows
  ORDER BY segment ASC, metric ASC
