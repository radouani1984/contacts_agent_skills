# apis/budget_brand_financial_detail.yaml

type: api

sql: |
  {{ $brand := .args.brand | default "" | replace "'" "''" }}
  {{ $country := .args.country | default "" | replace "'" "''" }}
  {{ $media := .args.media | default "" | replace "'" "''" }}
  {{ $subbrand := .args.subbrand | default "" | replace "'" "''" }}
  {{ $product := .args.product | default "" | replace "'" "''" }}
  {{ $submedia := .args.submedia | default "" | replace "'" "''" }}
  {{ $status := .args.status | default "" | replace "'" "''" }}
  {{ $workflow_process := .args.workflow_process | default "" | replace "'" "''" }}

  WITH base AS (
    SELECT *
    FROM bigquery_budget_model_2025
    WHERE 1 = 1

    {{ if $brand }}
      AND LOWER(TRIM(CAST(brand AS VARCHAR))) = LOWER(TRIM('{{ $brand }}'))
    {{ end }}

    {{ if $country }}
      AND LOWER(TRIM(CAST(country AS VARCHAR))) = LOWER(TRIM('{{ $country }}'))
    {{ end }}

    {{ if $media }}
      AND LOWER(TRIM(CAST(media AS VARCHAR))) = LOWER(TRIM('{{ $media }}'))
    {{ end }}

    {{ if $subbrand }}
      AND LOWER(TRIM(CAST(subbrand AS VARCHAR))) = LOWER(TRIM('{{ $subbrand }}'))
    {{ end }}

    {{ if $product }}
      AND LOWER(TRIM(CAST(product AS VARCHAR))) = LOWER(TRIM('{{ $product }}'))
    {{ end }}

    {{ if $submedia }}
      AND LOWER(TRIM(CAST(submedia AS VARCHAR))) = LOWER(TRIM('{{ $submedia }}'))
    {{ end }}

    {{ if $status }}
      AND LOWER(TRIM(CAST(status AS VARCHAR))) = LOWER(TRIM('{{ $status }}'))
    {{ end }}

    {{ if $workflow_process }}
      AND LOWER(TRIM(CAST(workflow_process AS VARCHAR))) = LOWER(TRIM('{{ $workflow_process }}'))
    {{ end }}
  ),

  totals AS (
    SELECT
      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(committed_total_eur, 0)) AS total_committed_eur,
      SUM(COALESCE(committed_gr_amount_eur, 0)) AS total_committed_gr_eur,
      SUM(COALESCE(committed_media_amount_eur, 0)) AS total_committed_media_eur,
      SUM(COALESCE(gross_investment_eur, 0)) AS total_gross_investment_eur,
      SUM(COALESCE(purchase_order_amount, 0)) AS total_purchase_order_amount,
      SUM(COALESCE(proposal_amount, 0)) AS total_proposal_amount,
      SUM(COALESCE(purchase_order_amount, 0)) - SUM(COALESCE(proposal_amount, 0)) AS proposal_to_po_gap,
      SUM(COALESCE(rate_card_eur, 0)) AS total_rate_card_eur,
      SUM(COALESCE(technical_costs_eur, 0)) AS total_technical_costs_eur,
      SUM(COALESCE(non_media_costs_eur, 0)) AS total_non_media_costs_eur,
      SUM(COALESCE(media_agency_fees_eur, 0)) AS total_media_agency_fees_eur,
      SUM(COALESCE(media_taxes_eur, 0)) AS total_media_taxes_eur,

      SUM(COALESCE(technical_costs_eur, 0)) / NULLIF(SUM(COALESCE(media_net_eur, 0)), 0) AS technical_cost_rate,
      SUM(COALESCE(media_agency_fees_eur, 0)) / NULLIF(SUM(COALESCE(media_net_eur, 0)), 0) AS agency_fee_rate,
      SUM(COALESCE(media_taxes_eur, 0)) / NULLIF(SUM(COALESCE(media_net_eur, 0)), 0) AS media_tax_rate,
      SUM(COALESCE(media_net_eur, 0)) / NULLIF(SUM(COALESCE(rate_card_eur, 0)), 0) AS media_net_vs_rate_card_ratio
    FROM base
  ),

  monthly AS (
    SELECT
      month_label,
      month_number,

      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(committed_total_eur, 0)) AS total_committed_eur,
      SUM(COALESCE(gross_investment_eur, 0)) AS total_gross_investment_eur,
      SUM(COALESCE(technical_costs_eur, 0)) AS total_technical_costs_eur,
      SUM(COALESCE(media_agency_fees_eur, 0)) AS total_media_agency_fees_eur
    FROM base
    GROUP BY month_label, month_number
  ),

  by_country AS (
    SELECT
      country,

      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(committed_total_eur, 0)) AS total_committed_eur,
      SUM(COALESCE(gross_investment_eur, 0)) AS total_gross_investment_eur
    FROM base
    WHERE country IS NOT NULL
      AND TRIM(CAST(country AS VARCHAR)) <> ''
    GROUP BY country
  ),

  by_media AS (
    SELECT
      media,

      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(gross_investment_eur, 0)) AS total_gross_investment_eur,
      SUM(COALESCE(technical_costs_eur, 0)) AS total_technical_costs_eur,
      SUM(COALESCE(media_agency_fees_eur, 0)) AS total_media_agency_fees_eur
    FROM base
    WHERE media IS NOT NULL
      AND TRIM(CAST(media AS VARCHAR)) <> ''
    GROUP BY media
  ),

  by_status AS (
    SELECT
      status,

      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(non_media_costs_eur, 0)) AS total_non_media_costs_eur
    FROM base
    WHERE status IS NOT NULL
      AND TRIM(CAST(status AS VARCHAR)) <> ''
    GROUP BY status
  ),

  by_workflow AS (
    SELECT
      workflow_process,

      SUM(COALESCE(media_net_eur, 0)) AS total_media_net_eur,
      SUM(COALESCE(committed_total_eur, 0)) AS total_committed_eur
    FROM base
    WHERE workflow_process IS NOT NULL
      AND TRIM(CAST(workflow_process AS VARCHAR)) <> ''
    GROUP BY workflow_process
  )

  SELECT
    'financial_kpis' AS section,
    'kpi' AS row_type,
    'Total Media Net EUR' AS label,
    CAST(NULL AS VARCHAR) AS dimension_value,
    total_media_net_eur AS value,
    1 AS sort_order
  FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Total Committed EUR', NULL, total_committed_eur, 2 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Gross Investment EUR', NULL, total_gross_investment_eur, 3 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Purchase Order Amount', NULL, total_purchase_order_amount, 4 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Proposal Amount', NULL, total_proposal_amount, 5 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Proposal to PO Gap', NULL, proposal_to_po_gap, 6 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Total Technical Costs EUR', NULL, total_technical_costs_eur, 7 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Total Non-Media Costs EUR', NULL, total_non_media_costs_eur, 8 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Total Agency Fees EUR', NULL, total_media_agency_fees_eur, 9 FROM totals

  UNION ALL
  SELECT 'financial_kpis', 'kpi', 'Total Media Taxes EUR', NULL, total_media_taxes_eur, 10 FROM totals

  UNION ALL
  SELECT 'financial_ratios', 'ratio', 'Technical Cost Rate', NULL, technical_cost_rate, 11 FROM totals

  UNION ALL
  SELECT 'financial_ratios', 'ratio', 'Agency Fee Rate', NULL, agency_fee_rate, 12 FROM totals

  UNION ALL
  SELECT 'financial_ratios', 'ratio', 'Media Tax Rate', NULL, media_tax_rate, 13 FROM totals

  UNION ALL
  SELECT 'financial_ratios', 'ratio', 'Media Net vs Rate Card Ratio', NULL, media_net_vs_rate_card_ratio, 14 FROM totals

  UNION ALL
  SELECT 'monthly_trend', 'month', 'Media Net EUR', month_label, total_media_net_eur, month_number FROM monthly

  UNION ALL
  SELECT 'monthly_trend', 'month', 'Committed EUR', month_label, total_committed_eur, month_number + 100 FROM monthly

  UNION ALL
  SELECT 'monthly_trend', 'month', 'Gross Investment EUR', month_label, total_gross_investment_eur, month_number + 200 FROM monthly

  UNION ALL
  SELECT 'monthly_trend', 'month', 'Agency Fees EUR', month_label, total_media_agency_fees_eur, month_number + 300 FROM monthly

  UNION ALL
  SELECT 'monthly_trend', 'month', 'Technical Costs EUR', month_label, total_technical_costs_eur, month_number + 400 FROM monthly

  UNION ALL
  SELECT
    'by_country',
    'breakdown',
    'Media Net EUR by Country',
    country,
    total_media_net_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_media_net_eur DESC, country ASC
    )
  FROM by_country

  UNION ALL
  SELECT
    'by_media',
    'breakdown',
    'Media Net EUR by Media',
    media,
    total_media_net_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_media_net_eur DESC, media ASC
    )
  FROM by_media

  UNION ALL
  SELECT
    'by_media_costs',
    'breakdown',
    'Technical Costs EUR by Media',
    media,
    total_technical_costs_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_technical_costs_eur DESC, media ASC
    )
  FROM by_media

  UNION ALL
  SELECT
    'by_media_fees',
    'breakdown',
    'Agency Fees EUR by Media',
    media,
    total_media_agency_fees_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_media_agency_fees_eur DESC, media ASC
    )
  FROM by_media

  UNION ALL
  SELECT
    'by_status',
    'breakdown',
    'Media Net EUR by Status',
    status,
    total_media_net_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_media_net_eur DESC, status ASC
    )
  FROM by_status

  UNION ALL
  SELECT
    'by_workflow',
    'breakdown',
    'Media Net EUR by Workflow',
    workflow_process,
    total_media_net_eur,
    ROW_NUMBER() OVER (
      ORDER BY total_media_net_eur DESC, workflow_process ASC
    )
  FROM by_workflow

  ORDER BY
    section,
    sort_order
