version: "1.1"
skill_id: filter_countries
skill_type: dimension_listing
name: Filter Countries
description: >
  Lists canonical country values available in the budget dataset with normalized variants
  and aggregate volume hints. Use it for country filter pickers and option discovery.
endpoint:
  id: filter_countries
  method: GET
use_when:
  - The user asks for available countries.
  - The planner needs a country option list.
  - The UI needs canonical filter values.
avoid_when:
  - The user gives a fuzzy or abbreviated country that needs resolution.
parameters:
  required: []
  optional:
    - limit
  defaults:
    limit: 100
response_contract:
  kind: dimension_values_list
  row_fields:
    - rank
    - value
    - label
    - normalized_value
    - normalized_compact
    - row_count
planner_hints:
  intent: list_countries
  retrieval_keywords:
    - available countries
    - list countries
    - filter countries
    - pays disponibles
    - valeurs pays
guardrails:
  - Prefer resolve_country for short forms such as US, UK or fuzzy country names.
planner_contract:
  task_type: list
  intent: list_values
  report_type: ""
  metric: ""
  metrics: []
  dimension: country
  required_filters: []
  optional_filters: []
  limit: 20
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
