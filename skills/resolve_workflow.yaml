version: "1.0"
skill_id: resolve_workflow
skill_type: dimension_resolver
name: Resolve Workflow
description: >
  Resolves a free-text workflow query into canonical workflow values using exact,
  prefix, contains and fuzzy matching with scores.
endpoint:
  id: resolve_workflow
  method: GET
use_when:
  - The user mentions a workflow that may be fuzzy or partial.
  - The planner needs canonical workflow values before analytics.
  - A top-k workflow disambiguation list is needed.
avoid_when:
  - The user only wants the workflow list.
parameters:
  required:
    - q
  optional:
    - limit
  defaults:
    limit: 10
response_contract:
  kind: resolution_candidates
  row_fields:
    - value
    - match_type
    - row_count
    - edit_distance
    - similarity_score
    - length_delta
    - score
planner_hints:
  intent: resolve_workflow_value
  retrieval_keywords:
    - resolve workflow
    - match workflow
    - normalize workflow
    - find workflow
    - process exact
guardrails:
  - Use this before analytics when workflow input comes from free-form user text.
planner_contract:
  task_type: resolve
  intent: resolve_value
  report_type: ""
  metric: ""
  metrics: []
  dimension: workflow_process
  required_inputs:
    - q
  limit: 10
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
