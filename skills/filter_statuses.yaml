version: "1.1"
skill_id: filter_statuses
skill_type: dimension_listing
name: Filter Statuses
description: >
  Lists canonical status values available in the budget dataset with normalized variants
  and aggregate volume hints. Use it for status filter selection and discovery.
endpoint:
  id: filter_statuses
  method: GET
use_when:
  - The user asks for available statuses.
  - The planner needs a closed list of status values.
  - The UI needs canonical status options.
avoid_when:
  - The user provides a status phrase that needs fuzzy matching.
parameters:
  required: []
  optional:
    - limit
  defaults:
    limit: 100
response_contract:
  kind: dimension_values_list
  row_fields:
    - rank
    - value
    - label
    - normalized_value
    - normalized_compact
    - row_count
planner_hints:
  intent: list_statuses
  retrieval_keywords:
    - available statuses
    - list statuses
    - filter statuses
    - statuts disponibles
guardrails:
  - Prefer resolve_status for user-entered text that may not match exactly.
planner_contract:
  task_type: list
  intent: list_values
  report_type: ""
  metric: ""
  metrics: []
  dimension: status
  required_filters: []
  optional_filters: []
  limit: 20
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
