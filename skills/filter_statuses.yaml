version: "1.0"
skill_id: filter_statuses
skill_type: dimension_listing
name: Filter Statuses
description: >
  Lists canonical status values available in the budget dataset with normalized variants
  and aggregate volume hints. Use it for status filter selection and discovery.
endpoint:
  id: filter_statuses
  method: GET
use_when:
  - The user asks for available statuses.
  - The planner needs a closed list of status values.
  - The UI needs canonical status options.
avoid_when:
  - The user provides a status phrase that needs fuzzy matching.
parameters:
  required: []
  optional:
    - limit
  defaults:
    limit: 100
response_contract:
  kind: dimension_values_list
  row_fields:
    - rank
    - value
    - label
    - normalized_value
    - normalized_compact
    - row_count
planner_hints:
  intent: list_statuses
  retrieval_keywords:
    - available statuses
    - list statuses
    - filter statuses
    - statuts disponibles
guardrails:
  - Prefer resolve_status for user-entered text that may not match exactly.
