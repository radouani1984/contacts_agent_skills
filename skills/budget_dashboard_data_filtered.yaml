version: "1.1"
skill_id: budget_dashboard_data_filtered
skill_type: analytical_query
name: Budget Dashboard Data Filtered
description: >
  Returns dashboard-ready KPI widgets for the filtered budget dataset. This skill is
  for summary cards and compact overview blocks, not for ranking tables or detailed
  per-dimension exploration.
endpoint:
  id: budget_dashboard_data_filtered
  method: GET
use_when:
  - The user wants a dashboard summary.
  - The user asks for headline KPIs on a filtered scope.
  - The UI needs compact widget blocks rather than detailed rows.
avoid_when:
  - The user asks for ranked top entities.
  - The user asks for a monthly series or deep profile sections.
parameters:
  required: []
  optional:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolve_before_execution:
    - brand
    - country
    - media
    - status
    - workflow_process
response_contract:
  kind: dashboard_widgets
  widget_ids:
    - main_kpis
    - ratio_kpis
    - cost_kpis
  row_fields:
    - widget_id
    - widget_type
    - label
    - value
    - sort_order
planner_hints:
  intent: dashboard_summary
  retrieval_keywords:
    - dashboard
    - summary
    - overview
    - synthese
    - kpi cards
    - widgets
  confidence_signals:
    - User asks for headline numbers.
    - User does not ask for rank, table or monthly evolution.
guardrails:
  - Prefer this skill for compact overview output.
  - Do not use this skill when the user explicitly needs a leaderboard or time series.
planner_contract:
  task_type: query
  intent: dashboard
  report_type: dashboard
  default_metric: media_net
  default_metrics:
    - media_net
  required_filters: []
  optional_filters:
    - brand
    - country
    - media
    - status
    - workflow_process
  group_by: []
  limit: 15
  query_budget_params:
    report_type: dashboard
    metric_from: metric
    brand_from_filter: brand
    country_from_filter: country
    media_from_filter: media
    status_filter_from_filter: status
    workflow_process_from_filter: workflow_process
    limit_from: limit
  expected_output_sections:
    - kpis
    - ratios
    - summary
  frontend_expectation:
    charts:
      - kpi_cards
  compiler_hints:
    fill_missing_metric_from_default: true
    fill_missing_metrics_from_metric: true
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
metric_column_mapping:
  media_net: total_media_net_eur
  gross_investment: total_gross_investment_eur
  media_agency_fees: total_media_agency_fees_eur
  technical_costs: total_technical_costs_eur
  media_taxes: total_media_taxes_eur
  non_media_costs: total_non_media_costs_eur
  committed: total_committed_eur
  purchase_order_amount: total_purchase_order_amount
  proposal_amount: total_proposal_amount
  proposal_to_po_gap: proposal_to_po_gap
  rate_card: total_rate_card_eur
filter_contract:
  allowed_dimensions:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolver_required_for_user_values: true
  resolver_tool: resolve_value
  resolver_output_field: canonical_value
  preserve_source_value: true
  query_budget_filter_mapping:
    brand: brand
    country: country
    media: media
    status: status_filter
    workflow_process: workflow_process
