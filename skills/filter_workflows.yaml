version: "1.0"
skill_id: filter_workflows
skill_type: dimension_listing
name: Filter Workflows
description: >
  Lists canonical workflow values available in the budget dataset with normalized variants
  and aggregate volume hints. Use it for workflow filter selection and discovery.
endpoint:
  id: filter_workflows
  method: GET
use_when:
  - The user asks for available workflows.
  - The planner needs a workflow option list.
  - The UI needs canonical workflow values.
avoid_when:
  - The user provides a fuzzy workflow phrase that needs resolution.
parameters:
  required: []
  optional:
    - limit
  defaults:
    limit: 100
response_contract:
  kind: dimension_values_list
  row_fields:
    - rank
    - value
    - label
    - normalized_value
    - normalized_compact
    - row_count
planner_hints:
  intent: list_workflows
  retrieval_keywords:
    - available workflows
    - list workflows
    - filter workflows
    - workflows disponibles
    - process disponibles
guardrails:
  - Prefer resolve_workflow for fuzzy user input.
planner_contract:
  task_type: list
  intent: list_values
  report_type: ""
  metric: ""
  metrics: []
  dimension: workflow_process
  required_filters: []
  optional_filters: []
  limit: 20
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
