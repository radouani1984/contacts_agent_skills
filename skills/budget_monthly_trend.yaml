version: "1.0"
skill_id: budget_monthly_trend
skill_type: analytical_query
name: Budget Monthly Trend
description: >
  Returns a month-by-month time series for one selected metric over the filtered budget
  dataset. Use it for evolution, seasonality and timeline analysis.
endpoint:
  id: budget_monthly_trend
  method: GET
use_when:
  - The user asks for monthly evolution or trend.
  - The request mentions over time, par mois, timeline or seasonality.
  - The user wants a line chart or month series.
avoid_when:
  - The user asks for a full multi-section financial profile.
  - The user asks for top ranked entities.
parameters:
  required: []
  optional:
    - brand
    - country
    - media
    - status
    - workflow_process
    - metric
  defaults:
    metric: media_net
  accepted_values:
    metric:
      - media_net
      - gross_investment
      - media_agency_fees
      - technical_costs
      - media_taxes
      - non_media_costs
      - committed
      - purchase_order_amount
      - proposal_amount
      - proposal_to_po_gap
      - rate_card
  resolve_before_execution:
    - brand
    - country
    - media
    - status
    - workflow_process
response_contract:
  kind: time_series
  row_fields:
    - month
    - month_date
    - month_number
    - selected_metric
    - selected_value_eur
  extra_fields:
    - total_media_net_eur
    - total_committed_eur
    - total_gross_investment_eur
    - total_media_agency_fees_eur
    - total_technical_costs_eur
    - total_media_taxes_eur
    - total_non_media_costs_eur
    - total_purchase_order_amount
    - total_proposal_amount
    - proposal_to_po_gap
    - total_rate_card_eur
planner_hints:
  intent: monthly_trend
  retrieval_keywords:
    - monthly
    - trend
    - evolution
    - par mois
    - timeline
    - seasonality
    - line chart
  confidence_signals:
    - Mention of time.
    - Mention of one metric moving across months.
guardrails:
  - Select a metric explicitly when the user mentions a measure.
  - Default to media_net only when no metric is requested.
planner_contract:
  task_type: query
  intent: monthly_trend
  report_type: monthly_trend
  default_metric: media_net
  default_metrics:
    - media_net
  accepted_metrics:
    - media_net
    - gross_investment
    - media_agency_fees
    - technical_costs
    - media_taxes
    - non_media_costs
    - committed
    - purchase_order_amount
    - proposal_amount
    - proposal_to_po_gap
    - rate_card
  required_filters: []
  optional_filters:
    - brand
    - country
    - media
    - status
    - workflow_process
  group_by:
    - month
  limit: 15
  query_budget_params:
    report_type: monthly_trend
    metric_from: metric
    brand_from_filter: brand
    country_from_filter: country
    media_from_filter: media
    status_filter_from_filter: status
    workflow_process_from_filter: workflow_process
    limit_from: limit
  expected_output_sections:
    - monthly_trend
  frontend_expectation:
    dataset_id: main
    default_chart: line
    x: month
    y: selected_value_eur
  compiler_hints:
    fill_missing_metric_from_default: true
    fill_missing_metrics_from_metric: true
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
metric_column_mapping:
  media_net: total_media_net_eur
  gross_investment: total_gross_investment_eur
  media_agency_fees: total_media_agency_fees_eur
  technical_costs: total_technical_costs_eur
  media_taxes: total_media_taxes_eur
  non_media_costs: total_non_media_costs_eur
  committed: total_committed_eur
  purchase_order_amount: total_purchase_order_amount
  proposal_amount: total_proposal_amount
  proposal_to_po_gap: proposal_to_po_gap
  rate_card: total_rate_card_eur
filter_contract:
  allowed_dimensions:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolver_required_for_user_values: true
  resolver_tool: resolve_value
  resolver_output_field: canonical_value
  preserve_source_value: true
  query_budget_filter_mapping:
    brand: brand
    country: country
    media: media
    status: status_filter
    workflow_process: workflow_process
