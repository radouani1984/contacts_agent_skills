version: "1.1"
skill_id: filter_products
skill_type: dimension_listing
name: Filter Products
description: >
  Lists canonical product values available in the budget dataset with normalized variants
  and aggregate volume hints. Use it when the agent needs available product options.
endpoint:
  id: filter_products
  method: GET
use_when:
  - The user asks for available products.
  - The planner needs a list source for a picker or disambiguation UI.
  - The agent needs canonical values without fuzzy search.
avoid_when:
  - The user provides a fuzzy product that needs matching.
parameters:
  required: []
  optional:
    - limit
  defaults:
    limit: 100
response_contract:
  kind: dimension_values_list
  row_fields:
    - rank
    - value
    - label
    - normalized_value
    - normalized_compact
    - row_count
planner_hints:
  intent: list_brands
  retrieval_keywords:
    - available products
    - list products
    - filter products
    - products disponibles
    - valeurs product
guardrails:
  - Prefer resolve_brand when the input is user-provided free text.
  - Use this skill for option listing, not ranking or financial analysis.
planner_contract:
  task_type: list
  intent: list_values
  report_type: ""
  metric: ""
  metrics: []
  dimension: product
  required_filters: []
  optional_filters: []
  limit: 20
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
