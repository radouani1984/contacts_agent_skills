routing_examples:
  - user: "Details financier sur Fructis"
    selected_skill: budget_brand_financial_detail
    expected_intent:
      task_type: query
      report_type: brand_detail
      metric: media_net
      metrics:
        - media_net
        - gross_investment
        - committed
        - proposal_amount
        - purchase_order_amount
        - technical_costs
        - media_agency_fees
        - media_taxes
        - rate_card
      filters:
        - dimension: brand
          source_value: Fructis
  - user: "Top brands"
    selected_skill: budget_top_brands
    expected_intent:
      task_type: query
      report_type: top_brands
      metric: media_net
      metrics:
        - media_net
      filters: []
  - user: "Top brands in France"
    selected_skill: budget_top_brands
    expected_intent:
      task_type: query
      report_type: top_brands
      metric: media_net
      metrics:
        - media_net
      filters:
        - dimension: country
          source_value: France
  - user: "Top countries by media agency fees"
    selected_skill: budget_top_countries
    expected_intent:
      task_type: query
      report_type: top_countries
      metric: media_agency_fees
      metrics:
        - media_agency_fees
      filters: []
  - user: "Monthly trend for Fructis"
    selected_skill: budget_monthly_trend
    expected_intent:
      task_type: query
      report_type: monthly_trend
      metric: media_net
      metrics:
        - media_net
      filters:
        - dimension: brand
          source_value: Fructis
