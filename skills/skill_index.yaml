catalog_version: "1.1"
source_of_truth: skills/*.yaml
description: >
  Retrieval and compiler index for the Langflow planner agent. This catalog explains
  how to choose the closest skill, which planner contract fields are authoritative,
  and how the BudgetIntentCompiler should complete missing values deterministically.
global_dimensions:
  - brand
  - country
  - region
  - media
  - subbrand
  - product
  - submedia
  - digital_lever
  - status
  - workflow_process
  - flight_status
  - flight_progress
shared_metric_vocabulary:
  - media_net
  - gross_investment
  - media_agency_fees
  - technical_costs
  - media_taxes
  - non_media_costs
  - committed
  - purchase_order_amount
  - proposal_amount
  - proposal_to_po_gap
  - rate_card
compiler_policy:
  use_planner_contract: true
  selected_skill_is_source_of_truth: true
  fill_missing_metric_from_skill: true
  fill_missing_metrics_from_skill: true
  fill_missing_report_type_from_skill: true
  fill_missing_task_type_from_skill: true
  never_return_null: true
  null_replacements:
    string: ""
    dict: {}
    list: []
planner_flow:
  - Classify the request as analytical_query, dimension_listing or dimension_resolver.
  - Call retrieve_rill_skills and use this catalog to rank the nearest skills.
  - If a user supplied filter is fuzzy, run the corresponding resolve_* skill first.
  - If the user asks for possible values, use filter_* skills.
  - If the user asks for ranking, choose the correct budget_top_* skill based on the ranked entity.
  - If the user asks for evolution over time, choose budget_monthly_trend.
  - If the user asks for KPI cards or summary, choose budget_dashboard_data_filtered.
  - If the user asks for a complete financial view of one slice, choose budget_brand_financial_detail.
  - If the user asks to compare metrics or compare two dimension values, choose budget_compare_metrics.
  - If the user asks for a tableau croise dynamique or row/column matrix, choose budget_pivot_table.
resolution_policy:
  brand: resolve_brand
  country: resolve_country
  media: resolve_media
  subbrand: resolve_subbrand
  product: resolve_product
  submedia: resolve_submedia
  status: resolve_status
  workflow_process: resolve_workflow
listing_policy:
  brand: filter_brands
  country: filter_countries
  media: filter_media
  subbrand: filter_subbrands
  product: filter_products
  submedia: filter_submedia
  status: filter_statuses
  workflow_process: filter_workflows
retrieval_rules:
  - intent: brand_financial_profile
    primary_skill: budget_brand_financial_detail
    triggers:
      - detail
      - details financier
      - financial profile
      - brand profile
      - full view
      - breakdown
      - ratios
    fallback_skills:
      - budget_dashboard_data_filtered
      - budget_monthly_trend
  - intent: dashboard
    primary_skill: budget_dashboard_data_filtered
    triggers:
      - dashboard
      - summary
      - overview
      - kpi
      - widgets
    fallback_skills:
      - budget_brand_financial_detail
  - intent: monthly_trend
    primary_skill: budget_monthly_trend
    triggers:
      - trend
      - monthly
      - evolution
      - timeline
      - par mois
    fallback_skills:
      - budget_dashboard_data_filtered
      - budget_brand_financial_detail
  - intent: top_brands
    primary_skill: budget_top_brands
    triggers:
      - top brands
      - best brands
      - classement marques
      - ranking brands
    fallback_skills:
      - budget_brand_financial_detail
  - intent: top_countries
    primary_skill: budget_top_countries
    triggers:
      - top countries
      - best countries
      - classement pays
      - ranking countries
    fallback_skills:
      - budget_dashboard_data_filtered
  - intent: top_media
    primary_skill: budget_top_media
    triggers:
      - top media
      - top channels
      - classement media
      - ranking media
    fallback_skills:
      - budget_dashboard_data_filtered
  - intent: compare
    primary_skill: budget_compare_metrics
    triggers:
      - compare
      - comparaison
      - versus
      - vs
      - ecart
    fallback_skills:
      - budget_dashboard_data_filtered
  - intent: pivot
    primary_skill: budget_pivot_table
    triggers:
      - pivot
      - tableau croise
      - tableau croisé
      - matrix
      - cross tab
    fallback_skills:
      - budget_top_brands
  - intent: list_values
    primary_skill: filter_brands
    triggers:
      - available values
      - list values
      - filter values
  - intent: resolve_value
    primary_skill: resolve_brand
    triggers:
      - resolve value
      - match value
      - normalize value
nearest_skill_decision_tree:
  - If the user asks who is top or ranked, pick the budget_top_* skill matching the entity to rank.
  - If the user asks to compare two metrics or two dimension values, pick budget_compare_metrics.
  - If the user asks for a pivot table with rows and columns, pick budget_pivot_table.
  - If the user asks how a metric evolves over time, pick budget_monthly_trend.
  - If the user asks for KPI cards or quick summary, pick budget_dashboard_data_filtered.
  - If the user asks for detailed financial analysis with multiple sections, pick budget_brand_financial_detail.
  - If the user asks what values exist for a dimension, pick the matching filter_* skill.
  - If the user provides a fuzzy dimension value, pick the matching resolve_* skill before any analytical skill.
output_contract_for_planner:
  required_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
  notes:
    - The planner must return executable JSON only.
    - The planner must not answer the end user directly.
skills:
  - skill_id: budget_brand_financial_detail
    family: analytical_query
    report_type: brand_detail
    intent: brand_financial_profile
    default_metric: media_net
    required_filters:
      - brand
    optional_filters:
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - financial detail
      - details financier
      - brand profile
      - full profile
    use_when:
      - The user asks for financial details or a full budget profile.
      - The user wants KPI plus breakdowns, not just a ranking.
  - skill_id: budget_dashboard_data_filtered
    family: analytical_query
    report_type: dashboard
    intent: dashboard
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - dashboard
      - summary
      - overview
      - widgets
    use_when:
      - The user wants a dashboard summary.
      - The user asks for headline KPIs on a filtered scope.
  - skill_id: budget_monthly_trend
    family: analytical_query
    report_type: monthly_trend
    intent: monthly_trend
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - monthly trend
      - evolution
      - par mois
      - timeline
    use_when:
      - The user asks for monthly evolution or trend.
      - The user wants a line chart or month series.
  - skill_id: budget_top_brands
    family: analytical_query
    report_type: top_brands
    intent: top_brands
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - top brands
      - best brands
      - classement marques
      - ranking brands
    use_when:
      - The user asks for top brands, best brands or classement des marques.
      - The request is comparative and rank-based.
  - skill_id: budget_top_countries
    family: analytical_query
    report_type: top_countries
    intent: top_countries
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - top countries
      - best countries
      - classement pays
      - ranking countries
    use_when:
      - The user asks for top countries or classement par pays.
      - The request is about geographic ranking.
  - skill_id: budget_top_media
    family: analytical_query
    report_type: top_media
    intent: top_media
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
    aliases:
      - top media
      - top channels
      - classement media
      - ranking media
    use_when:
      - The user asks for top media, best channels or classement media.
      - The request is comparative across media types.
  - skill_id: budget_compare_metrics
    family: analytical_query
    report_type: compare
    intent: compare
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
      - flight_status
      - flight_progress
    aliases:
      - compare
      - comparaison
      - versus
      - vs
    use_when:
      - The user asks to compare two metrics or two dimension values.
      - The request should return side-by-side values.
  - skill_id: budget_pivot_table
    family: analytical_query
    report_type: pivot
    intent: pivot
    default_metric: media_net
    required_filters: []
    optional_filters:
      - brand
      - country
      - media
      - subbrand
      - product
      - submedia
      - status
      - workflow_process
      - flight_status
      - flight_progress
    aliases:
      - pivot
      - tableau croise
      - tableau croisé
      - matrix
    use_when:
      - The user asks for a pivot table with row and column dimensions.
      - The request should cross two budget dimensions.
  - skill_id: filter_brands
    family: dimension_listing
    report_type: ""
    intent: list_values
    default_metric: ""
    required_filters: []
    optional_filters: []
    aliases:
      - available brands
      - list brands
      - filter brands
    use_when:
      - The user asks for available brands.
      - The planner needs a list source for a picker or disambiguation UI.
  - skill_id: filter_countries
    family: dimension_listing
    report_type: ""
    intent: list_values
