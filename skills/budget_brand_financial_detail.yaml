version: "1.1"
skill_id: budget_brand_financial_detail
skill_type: analytical_query
name: Budget Brand Financial Detail
description: >
  Returns a full financial profile with KPI, ratio, monthly and dimensional breakdowns
  for the filtered budget dataset. Best suited for detailed analysis of one brand,
  optionally narrowed by country, media, status or workflow.
endpoint:
  id: budget_brand_financial_detail
  method: GET
use_when:
  - The user asks for financial details or a full budget profile.
  - The user wants KPI plus breakdowns, not just a ranking.
  - The request is about one brand or a tightly filtered slice.
avoid_when:
  - The user explicitly asks for a top ranking or leaderboard.
  - The user only wants a list of possible dimension values.
parameters:
  required: []
  optional:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolve_before_execution:
    - brand
    - country
    - media
    - status
    - workflow_process
response_contract:
  kind: sectioned_dataset
  sections:
    - financial_kpis
    - financial_ratios
    - monthly_trend
    - by_country
    - by_media
    - by_media_costs
    - by_media_fees
    - by_status
    - by_workflow
  row_fields:
    - section
    - row_type
    - label
    - dimension_value
    - value
    - sort_order
planner_hints:
  intent: brand_financial_detail
  retrieval_keywords:
    - detail
    - details
    - financial detail
    - details financier
    - profile
    - vue complete
    - breakdown
    - kpi
    - ratios
    - monthly trend
  confidence_signals:
    - Mention of a brand name.
    - Request for complete financial view or multiple sections.
guardrails:
  - Do not replace this skill with a top ranking endpoint when the user wants a full profile.
  - Resolve textual filters before execution when the user phrasing is fuzzy.
planner_contract:
  task_type: query
  intent: brand_financial_profile
  report_type: brand_detail
  default_metric: media_net
  default_metrics:
    - media_net
    - gross_investment
    - committed
    - proposal_amount
    - purchase_order_amount
    - technical_costs
    - media_agency_fees
    - media_taxes
    - rate_card
  accepted_metrics:
    - media_net
    - gross_investment
    - committed
    - proposal_amount
    - purchase_order_amount
    - technical_costs
    - media_agency_fees
    - media_taxes
    - rate_card
  required_filters:
    - brand
  optional_filters:
    - country
    - media
    - status
    - workflow_process
  group_by: []
  limit: 15
  query_budget_params:
    report_type: brand_detail
    metric_from: metric
    brand_from_filter: brand
    country_from_filter: country
    media_from_filter: media
    status_filter_from_filter: status
    workflow_process_from_filter: workflow_process
    limit_from: limit
  expected_output_sections:
    - financial_kpis
    - financial_ratios
    - monthly_trend
    - by_country
    - by_media
    - by_media_costs
    - by_media_fees
    - by_status
    - by_workflow
  frontend_expectation:
    kpis_from:
      - financial_kpis
      - financial_ratios
    datasets_from:
      - monthly_trend
      - by_country
      - by_media
      - by_media_costs
      - by_media_fees
      - by_status
      - by_workflow
    charts:
      - kpi_cards
      - ratio_cards
      - line_monthly_trend
      - bar_by_country
      - bar_by_media
      - table_by_status
      - table_by_workflow
  compiler_hints:
    fill_missing_metric_from_default: true
    fill_missing_metrics_from_default: true
    force_default_metrics: true
    never_reduce_to_single_media_net_only: true
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
metric_column_mapping:
  media_net: total_media_net_eur
  gross_investment: total_gross_investment_eur
  media_agency_fees: total_media_agency_fees_eur
  technical_costs: total_technical_costs_eur
  media_taxes: total_media_taxes_eur
  non_media_costs: total_non_media_costs_eur
  committed: total_committed_eur
  purchase_order_amount: total_purchase_order_amount
  proposal_amount: total_proposal_amount
  proposal_to_po_gap: proposal_to_po_gap
  rate_card: total_rate_card_eur
filter_contract:
  allowed_dimensions:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolver_required_for_user_values: true
  resolver_tool: resolve_value
  resolver_output_field: canonical_value
  preserve_source_value: true
  query_budget_filter_mapping:
    brand: brand
    country: country
    media: media
    status: status_filter
    workflow_process: workflow_process
