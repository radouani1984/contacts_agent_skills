version: "1.0"
skill_id: resolve_status
skill_type: dimension_resolver
name: Resolve Status
description: >
  Resolves a free-text status query into canonical status values using exact, prefix,
  contains and fuzzy matching with scores.
endpoint:
  id: resolve_status
  method: GET
use_when:
  - The user mentions a status that may be fuzzy or partial.
  - The planner needs canonical status values before analytics.
  - A top-k status disambiguation list is needed.
avoid_when:
  - The user only wants the full status list.
parameters:
  required:
    - q
  optional:
    - limit
  defaults:
    limit: 10
response_contract:
  kind: resolution_candidates
  row_fields:
    - value
    - match_type
    - row_count
    - edit_distance
    - similarity_score
    - length_delta
    - score
planner_hints:
  intent: resolve_status_value
  retrieval_keywords:
    - resolve status
    - match status
    - normalize status
    - find status
    - statut exact
guardrails:
  - Use this before analytics when status comes from free-form user text.
