version: "1.0"
skill_id: budget_top_countries
skill_type: analytical_query
name: Budget Top Countries
description: >
  Returns the top countries ranked by a selected metric on the filtered budget dataset.
  Use it for geographic leaderboard and country comparison requests.
endpoint:
  id: budget_top_countries
  method: GET
use_when:
  - The user asks for top countries or classement par pays.
  - The request is about geographic ranking.
  - The output should be a table ordered by one metric.
avoid_when:
  - The user asks only to resolve or list country values.
  - The user asks for monthly trend or a brand detail page.
parameters:
  required: []
  optional:
    - brand
    - country
    - media
    - status
    - workflow_process
    - metric
    - limit
  defaults:
    metric: media_net
    limit: 15
  accepted_values:
    metric:
      - media_net
      - gross_investment
      - media_agency_fees
      - technical_costs
      - media_taxes
      - non_media_costs
      - committed
      - purchase_order_amount
      - proposal_amount
      - proposal_to_po_gap
      - rate_card
  resolve_before_execution:
    - brand
    - country
    - media
    - status
    - workflow_process
response_contract:
  kind: ranking_table
  row_fields:
    - rank
    - label
    - country
    - selected_metric
    - selected_value_eur
    - row_count
planner_hints:
  intent: top_countries
  retrieval_keywords:
    - top countries
    - best countries
    - countries ranking
    - classement pays
    - pays les plus importants
  confidence_signals:
    - Country is the entity being compared.
guardrails:
  - Use this skill only when country is the ranked entity.
  - Resolve geographic filters before execution when user terms are fuzzy or abbreviated.
planner_contract:
  task_type: query
  intent: top_countries
  report_type: top_countries
  default_metric: media_net
  default_metrics:
    - media_net
  accepted_metrics:
    - media_net
    - gross_investment
    - media_agency_fees
    - technical_costs
    - media_taxes
    - non_media_costs
    - committed
    - purchase_order_amount
    - proposal_amount
    - proposal_to_po_gap
    - rate_card
  required_filters: []
  optional_filters:
    - brand
    - country
    - media
    - status
    - workflow_process
  group_by:
    - country
  limit: 15
  selected_value_policy:
    selected_metric_from: metric
    selected_value_eur_from_metric_column: true
    never_fallback_to_media_net_when_metric_differs: true
  query_budget_params:
    report_type: top_countries
    metric_from: metric
    brand_from_filter: brand
    country_from_filter: country
    media_from_filter: media
    status_filter_from_filter: status
    workflow_process_from_filter: workflow_process
    limit_from: limit
  frontend_expectation:
    dataset_id: main
    row_label_field: label
    selected_metric_field: selected_metric
    selected_value_field: selected_value_eur
    default_chart: bar
  compiler_hints:
    fill_missing_metric_from_default: true
    fill_missing_metrics_from_metric: true
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
metric_column_mapping:
  media_net: total_media_net_eur
  gross_investment: total_gross_investment_eur
  media_agency_fees: total_media_agency_fees_eur
  technical_costs: total_technical_costs_eur
  media_taxes: total_media_taxes_eur
  non_media_costs: total_non_media_costs_eur
  committed: total_committed_eur
  purchase_order_amount: total_purchase_order_amount
  proposal_amount: total_proposal_amount
  proposal_to_po_gap: proposal_to_po_gap
  rate_card: total_rate_card_eur
filter_contract:
  allowed_dimensions:
    - brand
    - country
    - media
    - status
    - workflow_process
  resolver_required_for_user_values: true
  resolver_tool: resolve_value
  resolver_output_field: canonical_value
  preserve_source_value: true
  query_budget_filter_mapping:
    brand: brand
    country: country
    media: media
    status: status_filter
    workflow_process: workflow_process
