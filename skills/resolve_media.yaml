version: "1.1"
skill_id: resolve_media
skill_type: dimension_resolver
name: Resolve Media
description: >
  Resolves a free-text media query into canonical media values while avoiding false
  positives on metric vocabulary such as media net or technical costs.
endpoint:
  id: resolve_media
  method: GET
use_when:
  - The user mentions a media value with possible spelling variation.
  - The planner needs canonical media values before analytics.
  - Media disambiguation is required.
avoid_when:
  - The request is only about the metric name and not a media dimension.
parameters:
  required:
    - q
  optional:
    - limit
  defaults:
    limit: 10
response_contract:
  kind: resolution_candidates
  row_fields:
    - value
    - match_type
    - row_count
    - edit_distance
    - similarity_score
    - length_delta
    - score
planner_hints:
  intent: resolve_media_value
  retrieval_keywords:
    - resolve media
    - match media
    - normalize media
    - find channel
    - media exacte
guardrails:
  - Do not call this resolver when the phrase clearly refers to a metric.
  - Use this before analytical execution if media input comes from user text.
planner_contract:
  task_type: resolve
  intent: resolve_value
  report_type: ""
  metric: ""
  metrics: []
  dimension: media
  required_inputs:
    - q
  limit: 10
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
