version: "1.0"
skill_id: resolve_country
skill_type: dimension_resolver
name: Resolve Country
description: >
  Resolves a free-text country query into canonical country values with alias handling
  for common abbreviations such as US, UK and UAE.
endpoint:
  id: resolve_country
  method: GET
use_when:
  - The user mentions a country that may be abbreviated or fuzzy.
  - The planner needs canonical country values before analytics.
  - Geographic disambiguation is needed.
avoid_when:
  - The user only wants the full list of countries.
parameters:
  required:
    - q
  optional:
    - limit
  defaults:
    limit: 10
response_contract:
  kind: resolution_candidates
  row_fields:
    - value
    - match_type
    - row_count
    - edit_distance
    - similarity_score
    - length_delta
    - score
planner_hints:
  intent: resolve_country_value
  retrieval_keywords:
    - resolve country
    - match country
    - normalize country
    - country alias
    - pays exact
guardrails:
  - Use this for abbreviations and aliases before analytical execution.
  - Keep the resolved country in params, not the raw user phrase.
planner_contract:
  task_type: resolve
  intent: resolve_value
  report_type: ""
  metric: ""
  metrics: []
  dimension: country
  required_inputs:
    - q
  limit: 10
  compiler_hints:
    never_return_null: true
    empty_string_for_missing_scalar: true
    empty_dict_for_missing_object: true
    empty_list_for_missing_array: true
output_contract:
  langflow_safe:
    never_return_null: true
    missing_string: ""
    missing_object: {}
    missing_array: []
  planner_output_fields:
    - version
    - component
    - status
    - selected_skill
    - task_type
    - report_type
    - metric
    - metrics
    - filters
    - group_by
    - limit
    - is_follow_up
    - keep_missing_context
    - compare
    - pivot
    - confidence
    - clarification
    - warnings
    - errors
