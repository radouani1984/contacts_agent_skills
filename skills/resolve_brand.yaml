version: "1.0"
skill_id: resolve_brand
skill_type: dimension_resolver
name: Resolve Brand
description: >
  Resolves a free-text brand query into the closest canonical brand values using exact,
  prefix, contains and fuzzy matching with confidence scores.
endpoint:
  id: resolve_brand
  method: GET
use_when:
  - The user mentions a brand with possible spelling variation.
  - The planner needs canonical brand values before executing an analytical query.
  - A top-k disambiguation list is needed.
avoid_when:
  - The user only wants to browse all brands.
parameters:
  required:
    - q
  optional:
    - limit
  defaults:
    limit: 10
response_contract:
  kind: resolution_candidates
  row_fields:
    - value
    - match_type
    - row_count
    - edit_distance
    - similarity_score
    - length_delta
    - score
planner_hints:
  intent: resolve_brand_value
  retrieval_keywords:
    - resolve brand
    - match brand
    - normalize brand
    - find brand
    - marque exacte
guardrails:
  - Use this before analytical skills when brand input is free text.
  - Accept exact match directly when score is 1.0; otherwise keep top candidates for validation.
